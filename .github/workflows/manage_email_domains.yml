name: Manage Email Domains

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Where should the domains go?"
        required: true
        type: choice
        options:
          - whitelist
          - blacklist
      domains:
        description: "Comma, space, or newline separated domains"
        required: true
        type: string

jobs:
  update-domains:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Update domain lists
        run: python email_cleaner_agent/domain_manager.py --action "${{ inputs.action }}" --domains "${{ inputs.domains }}"

      - name: Commit domain list updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add email_cleaner_agent/config.json email_cleaner_agent/bulk_trash.py
          if ! git diff --cached --quiet; then
            git commit -m "chore: ${{ inputs.action }} email domains [skip ci]"
            git pull --rebase origin main
            git push
          else
            echo "No domain list changes to commit."
          fi
