name: Daily Stock News Agent

on:
  schedule:
    - cron: '0 3 * * 1-5'   # 3:00 AM UTC = 8:30 AM IST, Mon–Fri (market days)
  workflow_dispatch:          # manual trigger from GitHub UI

jobs:
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run stock news agent
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          NEWS_WEBHOOK_URL: ${{ secrets.NEWS_WEBHOOK_URL }}
        run: python -u main.py --config agent_config.json --publish

      - name: Commit generated posts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posts/
          git diff --cached --quiet || git commit -m "chore: daily stock news post [skip ci]"
          git push
