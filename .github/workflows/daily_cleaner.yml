name: Daily Email Cleaner

on:
  schedule:
    - cron: '30 1 * * *'   # 1:30 AM UTC = 7:00 AM IST every day
  workflow_dispatch:         # allows manual run from GitHub UI

jobs:
  clean:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r email_cleaner_agent/requirements.txt

      - name: Run daily agent
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GITHUB_WORKFLOW_PAT: ${{ secrets.GITHUB_WORKFLOW_PAT }}
        run: python -u email_cleaner_agent/daily_agent.py

      - name: Commit updated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add email_cleaner_agent/bulk_trash.py email_cleaner_agent/domain_review.json docs/session.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: auto-update spam domain list [skip ci]"
            git pull --rebase origin main
            git push
          else
            echo "No updates to commit."
          fi
