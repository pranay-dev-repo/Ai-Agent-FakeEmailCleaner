<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Email Domain Review</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f5f5f5; color: #222; padding-bottom: 40px; }
    .container { max-width: 720px; margin: 28px auto; padding: 0 16px; }
    h1 { background: #1a73e8; color: #fff; padding: 15px 20px; border-radius: 8px; margin-bottom: 18px; font-size: 18px; }
    .card { background: #fff; border-radius: 8px; padding: 20px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,.1); }
    .card h3 { font-size: 14px; color: #555; margin-bottom: 12px; text-transform: uppercase; letter-spacing: .5px; }
    .auth-row { display: flex; gap: 8px; }
    .auth-row input { flex: 1; padding: 9px 12px; border: 1px solid #ddd; border-radius: 5px; font-size: 14px; }
    .btn { padding: 9px 18px; border: none; border-radius: 5px; cursor: pointer; font-size: 14px; font-weight: bold; transition: opacity .15s; }
    .btn:hover { opacity: .88; }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    .btn-blue   { background: #1a73e8; color: #fff; }
    .btn-green  { background: #0f9d58; color: #fff; }
    .btn-red    { background: #d93025; color: #fff; }
    .btn-grey   { background: #e8eaed; color: #444; }
    .hint { font-size: 12px; color: #999; margin-top: 7px; }
    .token-ok { font-size: 13px; color: #0f9d58; margin-top: 8px; display: none; }
    .toolbar { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 14px; }
    .toolbar .spacer { flex: 1; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th { background: #f1f3f4; padding: 10px 12px; text-align: left; color: #555; font-size: 13px; }
    td { padding: 9px 12px; border-bottom: 1px solid #f0f0f0; vertical-align: middle; }
    tr:hover td { background: #fafafa; }
    .badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: bold; }
    .badge-spam   { background: #fce8e6; color: #c5221f; }
    .badge-review { background: #e8f0fe; color: #1558d6; }
    #status { padding: 12px 16px; border-radius: 6px; font-size: 14px; margin-top: 14px; display: none; }
    .ok  { background: #e6f4ea; color: #137333; }
    .err { background: #fce8e6; color: #c5221f; }
    .empty { color: #888; font-style: italic; padding: 20px 0; text-align: center; }
    input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; accent-color: #1a73e8; }
    .count { color: #888; font-size: 13px; }
    .selected-count { font-size: 13px; color: #1a73e8; font-weight: bold; }
  </style>
</head>
<body>
<div class="container">

  <h1>Email Domain Review</h1>

  <!-- Fallback token card — hidden when opened via magic link -->
  <div class="card" id="token-card" style="display:none">
    <h3>GitHub Token <span style="font-size:11px;color:#d93025;font-weight:normal;text-transform:none">(manual fallback — open via email link for automatic auth)</span></h3>
    <div class="auth-row">
      <input type="password" id="pat" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx">
      <button class="btn btn-blue" onclick="saveToken()">Save</button>
      <button class="btn btn-grey" id="clear-btn" onclick="clearToken()" style="display:none">Clear</button>
    </div>
    <p class="hint">Needs <b>repo</b> + <b>workflow</b> scopes &bull; Stored only in your browser (localStorage)</p>
    <p class="token-ok" id="token-ok">Token saved</p>
  </div>

  <!-- Domains Card -->
  <div class="card">
    <h3>Review Domains <span class="count" id="meta"></span></h3>

    <div class="toolbar">
      <button class="btn btn-grey" onclick="selectAll()">Select All</button>
      <button class="btn btn-grey" onclick="selectNone()">Deselect All</button>
      <span class="selected-count" id="sel-count"></span>
      <span class="spacer"></span>
      <button class="btn btn-green" id="wl-btn" onclick="submit('whitelist')" disabled>Whitelist Selected</button>
      <button class="btn btn-red"   id="bl-btn" onclick="submit('blacklist')" disabled>Blacklist Selected</button>
    </div>

    <div id="body"><p class="empty">Loading domains...</p></div>
    <div id="status"></div>
  </div>

</div>
<script>
const REPO        = 'pranay-dev-repo/Ai-Agent-FakeEmailCleaner';
const JSON_URL    = `https://raw.githubusercontent.com/${REPO}/main/email_cleaner_agent/domain_review.json`;
// Netlify function URL — handles auth server-side (PAT never leaves server)
const DISPATCH_FN = '/.netlify/functions/dispatch';
// Fallback: direct GitHub API (used only with manual localStorage PAT)
const WF_URL      = `https://api.github.com/repos/${REPO}/actions/workflows/manage_email_domains.yml/dispatches`;

// ── Token from magic link ─────────────────────────────────────────────────────
function getMagicToken() {
  return new URLSearchParams(window.location.search).get('t') || null;
}

// ── Manual token fallback (localStorage) ─────────────────────────────────────
function saveToken() {
  const v = document.getElementById('pat').value.trim();
  if (!v) return;
  localStorage.setItem('gh_pat', v);
  document.getElementById('pat').value = '';
  showTokenSaved();
}
function clearToken() {
  localStorage.removeItem('gh_pat');
  document.getElementById('pat').value = '';
  document.getElementById('token-ok').style.display = 'none';
  document.getElementById('clear-btn').style.display = 'none';
}
function showTokenSaved() {
  document.getElementById('token-ok').style.display = 'block';
  document.getElementById('clear-btn').style.display = 'inline-block';
}

// ── Init ─────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  const token = getMagicToken();
  if (token) {
    // Magic link — no manual token entry needed
    const s = document.getElementById('status');
    s.textContent = '✓ Authenticated via email link. One-time use.';
    s.className = 'ok';
    s.style.display = 'block';
  } else {
    // No magic link — show manual token card
    document.getElementById('token-card').style.display = 'block';
    if (localStorage.getItem('gh_pat')) showTokenSaved();
  }
  load();
});

// ── Load domains ─────────────────────────────────────────────────────────────
async function load() {
  try {
    const r = await fetch(JSON_URL + '?t=' + Date.now());
    if (!r.ok) throw new Error('HTTP ' + r.status);
    render(await r.json());
  } catch (e) {
    document.getElementById('body').innerHTML =
      `<p class="empty" style="color:#d93025">Could not load domains: ${e.message}</p>`;
  }
}

function render(data) {
  const list = data.domains || [];
  const meta = document.getElementById('meta');
  if (!list.length) {
    document.getElementById('body').innerHTML = '<p class="empty">No domains to review right now.</p>';
    meta.textContent = '';
    return;
  }
  const updated = data.generated_at ? new Date(data.generated_at).toLocaleString() : '';
  meta.textContent = `— ${list.length} domains · updated ${updated}`;

  const rows = list.map((d) => `
    <tr>
      <td style="width:36px">
        <input type="checkbox" value="${d.domain}"
          ${d.ai_suggested === 'blacklist' ? 'checked' : ''}
          onchange="updateCount()">
      </td>
      <td style="font-weight:500">${d.domain}</td>
      <td class="count" style="text-align:right">${d.inbox_count}</td>
      <td>
        <span class="badge ${d.ai_suggested === 'blacklist' ? 'badge-spam' : 'badge-review'}">
          ${d.ai_suggested === 'blacklist' ? 'AI: Spam' : 'Review'}
        </span>
      </td>
    </tr>`).join('');

  document.getElementById('body').innerHTML = `
    <table>
      <thead><tr>
        <th></th><th>Domain</th>
        <th style="text-align:right">Inbox</th>
        <th>AI Suggestion</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
  updateCount();
}

// ── Selection helpers ────────────────────────────────────────────────────────
function allCheckboxes() { return document.querySelectorAll('#body input[type=checkbox]'); }
function selectAll()  { allCheckboxes().forEach(c => c.checked = true);  updateCount(); }
function selectNone() { allCheckboxes().forEach(c => c.checked = false); updateCount(); }
function getSelected() {
  return Array.from(document.querySelectorAll('#body input[type=checkbox]:checked')).map(c => c.value);
}
function updateCount() {
  const n = getSelected().length;
  document.getElementById('sel-count').textContent = n ? `${n} selected` : '';
  document.getElementById('wl-btn').disabled = n === 0;
  document.getElementById('bl-btn').disabled = n === 0;
}

// ── Submit ───────────────────────────────────────────────────────────────────
function showStatus(msg, ok) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = ok ? 'ok' : 'err';
  el.style.display = 'block';
}

async function submit(action) {
  const domains = getSelected();
  if (!domains.length) { showStatus('No domains selected.', false); return; }

  document.getElementById('wl-btn').disabled = true;
  document.getElementById('bl-btn').disabled = true;
  showStatus(`Submitting ${domains.length} domain(s)...`, true);

  const magicToken = getMagicToken();

  try {
    let resp;
    if (magicToken) {
      // Secure path: Netlify Function holds the PAT, validates one-time token server-side
      resp = await fetch(DISPATCH_FN, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token: magicToken, action, domains: domains.join(', ') }),
      });
    } else {
      // Fallback: direct GitHub API with manual PAT from localStorage
      const pat = localStorage.getItem('gh_pat');
      if (!pat) {
        showStatus('No auth token. Open the link from your email report.', false);
        updateCount();
        return;
      }
      resp = await fetch(WF_URL, {
        method: 'POST',
        headers: {
          Authorization: `Bearer ${pat}`,
          Accept: 'application/vnd.github+json',
          'Content-Type': 'application/json',
          'X-GitHub-Api-Version': '2022-11-28',
        },
        body: JSON.stringify({ ref: 'main', inputs: { action, domains: domains.join(', ') } }),
      });
    }

    if (resp.status === 204) {
      showStatus(`✓ ${domains.length} domain(s) queued for ${action}. Closing in 3 seconds...`, true);
      selectNone();
      setTimeout(() => window.close(), 3000);
    } else {
      const txt = await resp.text();
      showStatus(`Error ${resp.status} — ${txt}`, false);
      updateCount();
    }
  } catch (e) {
    showStatus(`Network error: ${e.message}`, false);
    updateCount();
  }
}
</script>
</body>
</html>
